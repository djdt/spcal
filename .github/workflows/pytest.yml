name: pytest
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.x
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Set up TBB and libs for pytest-qt
      run: |
        sudo apt update
        sudo apt install -y libgl1 libegl1 libdbus-1-3 libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils xvfb
        sudo apt install libtbb-dev
    - name: Install dependencies
      run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel pybind11 pytest-xvfb
    - name: Install project
      run: |
        pip install .[tests]
        python setup.py build_ext --inplace
    - name: Run pytest
      run: |
        pytest
